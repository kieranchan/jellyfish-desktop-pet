<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jellyfish Pet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
            cursor: default;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', Arial, sans-serif;
        }

        /* Canvas - fullscreen */
        #petCanvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <!-- Fullscreen Canvas -->
    <canvas id="petCanvas"></canvas>

    <!-- 按依赖顺序加载渲染脚本（已关闭 nodeIntegration，不能用 require） -->
    <script src="pet.js"></script>
    <script src="canvas.js"></script>
    <script src="behavior.js"></script>
    <script src="index.js"></script>
</body>
</html>
